<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Prototype 3 - Event Card</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="single-export">
    <main class="prototype-shell" aria-label="匿名設計原型三">
      <header class="brief-header compact-brief">
        <p class="kicker">Prototype 3</p>
        <h1>清爽活動卡</h1>
        <p>單頁輸出版。內容皆為保留位，適合討論活動包、主持感與商業擴充方向。</p>
      </header>

      <section class="prototype theme-event" aria-labelledby="proto-c">
        <div class="prototype-note">
          <span>方向 C</span>
          <strong id="proto-c">清爽活動卡</strong>
          <p>適合未來活動包、付費題包或主持人版本。重點是清楚、可靠、可擴充。</p>
        </div>

        <article class="mock-app dashboard">
          <aside class="side-rail">
            <div class="asset-placeholder badge">圖</div>
            <button class="is-active">關係 A</button>
            <button>關係 B</button>
            <button>關係 C</button>
          </aside>
          <section class="main-stage">
            <header class="stage-header">
              <div>
                <p class="mock-brand-label">產品名稱保留位</p>
                <h2>主標題保留位</h2>
              </div>
              <div class="progress-card">
                <span>已完成</span>
                <strong>0</strong>
              </div>
            </header>
            <div class="question-panel">
              <div class="play-meta">
                <span>第 00 題</span>
                <span>類型保留位</span>
              </div>
              <h3>題目文字保留位，用來測試大螢幕與平板上的閱讀感。</h3>
              <div class="form-grid">
                <select>
                  <option>L2 題目類型</option>
                </select>
                <select>
                  <option>題號選項</option>
                </select>
              </div>
              <textarea placeholder="評語保留位"></textarea>
            </div>
          </section>
        </article>
      </section>
    </main>
  </body>
</html>
